<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Install App - View More Images</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a73e8;
            --primary-dark: #1557b0;
            --secondary-color: #5f6368;
            --text-main: #202124;
            --text-muted: #5f6368;
            --bg-body: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent background for modal effect */
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-card {
            background: var(--card-bg);
            width: 90%;
            max-width: 400px;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .image-preview-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
            position: relative;
        }

        .image-preview-grid img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            filter: blur(2px);
            opacity: 0.7;
        }

        .overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            pointer-events: none;
        }

        .lock-icon {
            background: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin: 16px 0 8px;
        }

        .modal-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
            margin: 0 0 24px;
        }

        .btn-install {
            width: 100%;
            height: 52px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-install:active {
            background-color: var(--primary-dark);
        }

        .btn-cancel {
            display: block;
            margin-top: 16px;
            font-size: 14px;
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="modal-card">
        <div class="image-preview-grid">
            <img src="img_2.webp" alt="Preview 1">
            <img src="img_3.webp" alt="Preview 2">
            <img src="img_2.webp" alt="Preview 3">
            <img src="img_3.webp" alt="Preview 4">
            <div class="overlay-text">
                <div class="lock-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
            </div>
        </div>

        <h2 class="modal-title">Want to see more?</h2>
        <p class="modal-desc">Install our official app to access the full gallery and get exclusive content instantly.</p>

        <a href="#" class="btn-install" onclick="handleInstall()">Install App Now</a>
        <a href="index.html" class="btn-cancel">Not now</a>
    </div>

    <script>
        function handleInstall() {
            // Check if Android bridge exists to trigger download or open Play Store
            if (window.Android && typeof window.Android.downloadApp === 'function') {
                window.Android.downloadApp();
            } else {
                // Fallback for browser or if not implemented
                alert("Redirecting to download...");
                // window.location.href = "your_app_download_link.apk";
            }
        }
    </script>
</body>
</html>
