<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Install App - View Premium Content</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff2d55;
            --success-color: #28a745;
            --bg-body: #0a0a0a;
            --card-bg: rgba(0, 0, 0, 0.5);
            --text-main: #ffffff;
            --text-muted: #eeeeee;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* Slideshow Background */
        .slideshow {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -2;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .slideshow li {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            z-index: 0;
            animation: imageAnimation 24s linear infinite;
        }

        .slideshow li:nth-child(1) {
            background-image: url('images (1).jpeg');
        }
        .slideshow li:nth-child(2) {
            background-image: url('images (2).jpeg');
            animation-delay: 6s;
        }
        .slideshow li:nth-child(3) {
            background-image: url('images (3).jpeg');
            animation-delay: 12s;
        }
        .slideshow li:nth-child(4) {
            background-image: url('indiana-babe-shanaya-tank-top-bath-1.jpg');
            animation-delay: 18s;
        }

        @keyframes imageAnimation {
            0% { opacity: 0; animation-timing-function: ease-in; }
            8% { opacity: 1; animation-timing-function: ease-out; }
            25% { opacity: 1; }
            33% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* Dark Overlay for readability */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .install-card {
            background: var(--card-bg);
            width: 90%;
            max-width: 400px;
            border-radius: 30px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            z-index: 10;
        }

        .icon-box {
            background: linear-gradient(135deg, #ff2d55, #ff5e3a);
            width: 80px;
            height: 80px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 8px 20px rgba(255, 45, 85, 0.4);
        }

        h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 12px;
        }

        p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn-install {
            display: block;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 17px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 45, 85, 0.3);
            cursor: pointer;
            border: none;
            width: 100%;
            outline: none;
        }

        .btn-install:active {
            transform: scale(0.97);
        }

        .btn-install.ready-to-install {
            background: var(--success-color);
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
        }

        .preview-images {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .preview-images img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .preview-images img:hover {
            filter: blur(0px);
            transform: scale(1.1);
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>

    <ul class="slideshow">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>
    <div class="overlay"></div>

    <div class="install-card">
        <div class="icon-box">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </div>

        <h2>Unlock All Images</h2>
        <p>Install our official app to see 500+ private images and exclusive high-definition videos of our models.</p>

        <div class="preview-images">
            <img src="images (1).jpeg" alt="P1">
            <img src="images (2).jpeg" alt="P2">
            <img src="images (3).jpeg" alt="P3">
            <img src="indiana-babe-shanaya-tank-top-bath-1.jpg" alt="P4">
        </div>

        <button id="installBtn" class="btn-install" onclick="handleInstall()">Download & Install App</button>
    </div>

    <script>
        function handleInstall() {
            const btn = document.getElementById('installBtn');

            // If already downloaded, trigger install
            if (btn.classList.contains('ready-to-install')) {
                if (window.Android && typeof window.Android.installApp === 'function') {
                    window.Android.installApp();
                } else {
                    // This would normally trigger the system installer for the APK
                    window.location.href = 'app.apk';
                }
                return;
            }

            // Start simulated download
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.9';

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 10) + 2;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);

                    // Transformation to Install button
                    btn.innerHTML = 'Install Now';
                    btn.classList.add('ready-to-install');
                    btn.style.pointerEvents = 'auto';
                    btn.style.opacity = '1';

                    // Trigger actual download in background if bridge exists
                    if (window.Android && typeof window.Android.downloadApp === 'function') {
                        window.Android.downloadApp();
                    }
                } else {
                    btn.innerHTML = `Downloading... ${progress}%`;
                }
            }, 200);
        }
    </script>
</body>
</html>
